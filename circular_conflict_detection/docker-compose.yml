version: "3.8"

services:
  api:
    build: .
    container_name: circular_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: always

  dashboard:
    build: .
    container_name: circular_dashboard
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000/api/v1
    restart: always
